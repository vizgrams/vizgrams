# Auth layer — adds the oauth2-proxy service and disables the dev bypass on api.
# Never used standalone. Always layered on top of docker-compose.yml.
#
# This file is intentionally *topology-free*: it declares the oauth2-proxy
# service, but the routing rules that put it in front of the UI and apply
# ForwardAuth to the API live in a deployment overlay:
#
#   Local dev:  dev/docker-compose.auth.local.yml   (in this repo)
#   Production: deploy/docker-compose.prod.yml      (in vizgrams/ops)
#
# Keeping the routing topology in the deployment layer means self-hosters who
# use a different reverse proxy (nginx, Caddy, Cloudflare Tunnel) don't have
# to inherit Traefik decisions baked into the public app.
#
# Use 'make up-auth' (local) or the ops deploy pipeline (prod) rather than
# running this file directly.

services:

  # ── Auth proxy ────────────────────────────────────────────────────────────────
  # Swap OIDC_ISSUER_URL to change provider — no app code changes needed.
  #
  # Google:   OIDC_ISSUER_URL=https://accounts.google.com
  # Entra ID: OIDC_ISSUER_URL=https://login.microsoftonline.com/{tenant}/v2.0
  # Okta:     OIDC_ISSUER_URL=https://{domain}.okta.com
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OAUTH2_PROXY_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OAUTH2_PROXY_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_COOKIE_SECRET:-}
      OAUTH2_PROXY_COOKIE_NAME: _wt2_session
      OAUTH2_PROXY_COOKIE_SECURE: "${OAUTH2_COOKIE_SECURE:-false}"
      OAUTH2_PROXY_EMAIL_DOMAINS: "${ALLOWED_EMAIL_DOMAINS:-*}"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_UPSTREAMS: "http://ui:8080"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      OAUTH2_PROXY_REDIRECT_URL: "http://${HOST:-localhost}/oauth2/callback"
      # Allow /oauth2/sign_out?rd= to redirect to the upstream IdP logout page.
      # Set OIDC_LOGOUT_DOMAIN to the IdP domain (e.g. vizgrams.eu.auth0.com) in
      # prod so the "sign out of all devices" path can chain through to Auth0.
      # Leave blank for local dev — cookie-only sign-out is sufficient.
      OAUTH2_PROXY_WHITELIST_DOMAIN: "${OIDC_LOGOUT_DOMAIN:-}"
      # Skip the intermediate "Sign In" button — go straight to the IdP.
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
    tmpfs:
      - /tmp:size=32m,mode=1777
    networks:
      - proxy

  # Disable the DEV_USER bypass when auth is active — every request must carry
  # either a valid session header (OIDC users, set by oauth2-proxy upstream of
  # this service) or an X-API-Key (service accounts, validated inside FastAPI).
  api:
    environment:
      DEV_USER: ""
