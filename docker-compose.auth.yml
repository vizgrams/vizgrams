# Auth layer — adds oauth2-proxy and protects routes.
# Never used standalone. Always layered on top of docker-compose.yml:
#
#   With Dex (local):  docker-compose.yml + docker-compose.auth.yml + docker-compose.dex.yml
#   With real OIDC:    docker-compose.yml + docker-compose.auth.yml
#
# Use 'make up-auth' or 'make up-prod' rather than running directly.
#
# Architecture:
#   UI traffic  → Traefik → oauth2-proxy (handles auth + proxies to ui:8080)
#   API traffic → Traefik → ForwardAuth (validates session cookie) → api
#
# This ensures unauthenticated browser visits are redirected to the IdP login
# page by oauth2-proxy rather than receiving a bare 401.

services:

  # ── Auth proxy ────────────────────────────────────────────────────────────────
  # Swap OIDC_ISSUER_URL to change provider — no app code changes needed.
  #
  # Google:   OIDC_ISSUER_URL=https://accounts.google.com
  # Entra ID: OIDC_ISSUER_URL=https://login.microsoftonline.com/{tenant}/v2.0
  # Okta:     OIDC_ISSUER_URL=https://{domain}.okta.com
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OAUTH2_PROXY_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OAUTH2_PROXY_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_COOKIE_SECRET:-}
      OAUTH2_PROXY_COOKIE_NAME: _wt2_session
      OAUTH2_PROXY_COOKIE_SECURE: "${OAUTH2_COOKIE_SECURE:-false}"
      OAUTH2_PROXY_EMAIL_DOMAINS: "${ALLOWED_EMAIL_DOMAINS:-*}"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      # Proxy authenticated requests to the UI; /api/* is routed by Traefik before
      # it reaches oauth2-proxy so the API service is unaffected.
      OAUTH2_PROXY_UPSTREAMS: "http://ui:8080"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      OAUTH2_PROXY_REDIRECT_URL: "http://${HOST:-localhost}/oauth2/callback"
      # Chain logout to the upstream IdP so the provider session is also terminated.
      # For Auth0: https://vizgrams.eu.auth0.com/v2/logout?client_id=...&returnTo=...
      # Leave blank (default) for local dev — oauth2-proxy-only logout is sufficient.
      OAUTH2_PROXY_OIDC_LOGOUT_URL: "${OIDC_LOGOUT_URL:-}"
      # Skip the intermediate "Sign In" button — go straight to the IdP.
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
    tmpfs:
      - /tmp:size=32m,mode=1777
    labels:
      traefik.enable: "true"
      # Service definition (port 4180)
      traefik.http.services.oauth2-proxy.loadbalancer.server.port: "4180"
      # Route /oauth2/* (callback, sign-in, etc.) to oauth2-proxy at high priority
      traefik.http.routers.oauth2-proxy.rule: PathPrefix(`/oauth2`)
      traefik.http.routers.oauth2-proxy.entrypoints: web
      traefik.http.routers.oauth2-proxy.priority: "20"
      traefik.http.routers.oauth2-proxy.service: oauth2-proxy
      # ForwardAuth middleware — used only by the API router
      traefik.http.middlewares.auth.forwardauth.address: "http://oauth2-proxy:4180/oauth2/auth"
      traefik.http.middlewares.auth.forwardauth.trustforwardheader: "true"
      traefik.http.middlewares.auth.forwardauth.authresponseheaders: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Preferred-Username"
    networks:
      - proxy

  # Override the ui router to route through oauth2-proxy instead of directly to nginx.
  # oauth2-proxy validates the session and proxies authenticated requests to ui:8080.
  ui:
    labels:
      traefik.http.routers.ui.service: oauth2-proxy@docker

  # API still uses ForwardAuth — the browser already holds the session cookie
  # from logging in via the UI, so the check passes transparently.
  api:
    environment:
      DEV_USER: ""    # disable the dev bypass when auth is active
    labels:
      traefik.http.routers.api.middlewares: auth@docker
