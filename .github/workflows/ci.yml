name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Python: lint + test
  # ---------------------------------------------------------------------------
  python:
    name: Python lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4.2.3
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Test
        run: poetry run pytest tests/ -q --tb=short
        env:
          DEV_USER: ci@example.com

  # ---------------------------------------------------------------------------
  # UI: lint + build
  # ---------------------------------------------------------------------------
  ui:
    name: UI lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Lint
        working-directory: ui
        run: npm run lint

      - name: Build
        working-directory: ui
        run: npm run build

  # ---------------------------------------------------------------------------
  # Docker: build all three images.
  # On PRs: build only (validates Dockerfiles, no push).
  # On push to main: build and push to ECR, tagged :latest and :<git-sha>.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python, ui]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: Dockerfile.api
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry && format('{0}/api:latest', steps.login-ecr.outputs.registry) || 'vizgrams/api:ci' }}
            ${{ steps.login-ecr.outputs.registry && format('{0}/api:{1}', steps.login-ecr.outputs.registry, github.sha) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push batch image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: Dockerfile.batch
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry && format('{0}/batch-service:latest', steps.login-ecr.outputs.registry) || 'vizgrams/batch:ci' }}
            ${{ steps.login-ecr.outputs.registry && format('{0}/batch-service:{1}', steps.login-ecr.outputs.registry, github.sha) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: Dockerfile.ui
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry && format('{0}/ui:latest', steps.login-ecr.outputs.registry) || 'vizgrams/ui:ci' }}
            ${{ steps.login-ecr.outputs.registry && format('{0}/ui:{1}', steps.login-ecr.outputs.registry, github.sha) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
