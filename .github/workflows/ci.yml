name: CI

on:
  push:
    branches: [main]
    # Semver tags trigger a versioned publish to GHCR. Tag pushes are NOT
    # restricted by the branches filter above — they fire regardless.
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Python: lint + test
  # ---------------------------------------------------------------------------
  python:
    name: Python lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4.2.3
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Test
        run: poetry run pytest tests/ -q --tb=short
        env:
          DEV_USER: ci@example.com

  # ---------------------------------------------------------------------------
  # UI: lint + build
  # ---------------------------------------------------------------------------
  ui:
    name: UI lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Lint
        working-directory: ui
        run: npm run lint

      - name: Build
        working-directory: ui
        run: npm run build

  # ---------------------------------------------------------------------------
  # Docker: build + publish images to GHCR.
  #
  # PRs build only (validates Dockerfiles).
  # Push to main publishes :main + :sha-<full> (mutable + immutable).
  # Tag v1.2.3 publishes :1.2.3, :1.2, :1 (all immutable).
  #
  # Ops repos pin a specific version — :latest is intentionally NEVER
  # published so it can't be accidentally consumed.
  # ---------------------------------------------------------------------------
  docker:
    # Job name kept as "Docker build" — the main branch protection ruleset
    # references that exact context name as a required check. Publishing is
    # what the job actually does now (see header comment).
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python, ui]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-image metadata — drives tags. type=ref tags `main` on a main
      # push; type=sha tags `sha-<long>`; semver tags fire on v* git tags.
      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vizgrams/api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build & push API image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: Dockerfile.api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Batch image metadata
        id: meta-batch
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vizgrams/batch
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build & push batch image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: Dockerfile.batch
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-batch.outputs.tags }}
          labels: ${{ steps.meta-batch.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: UI image metadata
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vizgrams/ui
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build & push UI image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: Dockerfile.ui
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Helm chart: lint on every push/PR, package + publish to GHCR's OCI
  # registry only on semver tags. Chart version + appVersion are stamped
  # from the git tag so the chart and the images it references stay in
  # lockstep.
  # ---------------------------------------------------------------------------
  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Lint chart
        run: helm lint charts/vizgrams

      - name: Render chart (default values)
        run: helm template vizgrams charts/vizgrams > /dev/null

      - name: Render chart (enterprise example values)
        run: |
          helm template vizgrams charts/vizgrams \
            -f charts/vizgrams/values-enterprise.example.yaml > /dev/null

      - name: Stamp chart version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i "s/^version:.*/version: ${VERSION}/" charts/vizgrams/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/vizgrams/Chart.yaml
          echo "Stamped chart version: ${VERSION}"
          grep -E '^(version|appVersion):' charts/vizgrams/Chart.yaml

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package + push chart
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          helm package charts/vizgrams --destination /tmp/chart
          helm push /tmp/chart/vizgrams-*.tgz oci://ghcr.io/vizgrams/charts
