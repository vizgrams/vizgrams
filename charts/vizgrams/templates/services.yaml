apiVersion: v1
kind: Service
metadata:
  name: {{ include "vizgrams.fullname" . }}-api
  labels:
    {{- include "vizgrams.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
  selector:
    {{- include "vizgrams.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vizgrams.fullname" . }}-batch
  labels:
    {{- include "vizgrams.labels" . | nindent 4 }}
    app.kubernetes.io/component: batch
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.batch.port }}
      targetPort: http
  selector:
    {{- include "vizgrams.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: batch
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vizgrams.fullname" . }}-ui
  labels:
    {{- include "vizgrams.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.ui.port }}
      targetPort: http
  selector:
    {{- include "vizgrams.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
