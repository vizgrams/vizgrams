# Dex production config — Google + Sign in with Apple connectors.
#
# Dex acts as the OIDC hub: it federates upstream providers and presents a
# single OIDC endpoint to oauth2-proxy.  This means oauth2-proxy never changes
# regardless of which social login the user picks.
#
# Environment variables are substituted by Dex at startup (native support).
# Set them via docker-compose environment or your secrets manager.
#
# Required env vars:
#   DEX_HOST             — public hostname (e.g. vizgrams.com)
#   DEX_CLIENT_SECRET    — shared secret between Dex and oauth2-proxy
#   GOOGLE_CLIENT_ID     — from Google Cloud Console
#   GOOGLE_CLIENT_SECRET — from Google Cloud Console
#   APPLE_CLIENT_ID      — Apple Services ID (e.g. com.vizgrams.web)
#   APPLE_TEAM_ID        — Apple Developer Team ID
#   APPLE_KEY_ID         — Apple key identifier
#   APPLE_PRIVATE_KEY    — contents of the .p8 key file (newlines as \n)

issuer: https://${DEX_HOST}/dex

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true
  responseTypes:
    - code

# The single client: oauth2-proxy.
staticClients:
  - id: vizgrams
    redirectURIs:
      - https://${DEX_HOST}/oauth2/callback
    name: Vizgrams
    secret: ${DEX_CLIENT_SECRET}

connectors:
  # ── Google ──────────────────────────────────────────────────────────────────
  # Register at console.cloud.google.com → APIs & Services → Credentials
  # Authorized redirect URI: https://{DEX_HOST}/dex/callback
  - type: oidc
    id: google
    name: Google
    config:
      issuer: https://accounts.google.com
      clientID: ${GOOGLE_CLIENT_ID}
      clientSecret: ${GOOGLE_CLIENT_SECRET}
      redirectURI: https://${DEX_HOST}/dex/callback
      scopes:
        - openid
        - email
        - profile

  # ── Sign in with Apple ───────────────────────────────────────────────────────
  # Configure at developer.apple.com → Certificates, Identifiers & Profiles
  # Services ID redirect URL: https://{DEX_HOST}/dex/callback
  # Note: Apple requires HTTPS and a registered domain.
  - type: apple
    id: apple
    name: Apple
    config:
      clientID: ${APPLE_CLIENT_ID}
      teamID: ${APPLE_TEAM_ID}
      keyID: ${APPLE_KEY_ID}
      # Contents of the .p8 private key file. Pass with newlines preserved.
      key: ${APPLE_PRIVATE_KEY}
      redirectURI: https://${DEX_HOST}/dex/callback
