$schema: "https://json-schema.org/draft/2020-12/schema"
title: View Config
description: Schema for view YAML files.
type: object
required: [name, type, query, visualization]
properties:
  name:
    type: string
    pattern: "^[a-z][a-z0-9_]*$"
  type:
    type: string
    enum: [chart, metric, table, map]
  query:
    type: string
    pattern: "^[a-z][a-z0-9_]*$"
  measure:
    type: string
  visualization:
    type: object
  inputs:
    type: object
    additionalProperties:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [STRING, INTEGER, BOOLEAN]
        default: {}
