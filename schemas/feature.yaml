# JSON Schema (2020-12 draft) for feature YAML configs (ADR-113, ADR-116).
# Stored as YAML for consistency with the rest of the project.
$schema: "https://json-schema.org/draft/2020-12/schema"
title: Feature Definition
description: Schema for analytical feature YAML definitions.
type: object
required: [feature_id, name, entity_type, entity_key, data_type, materialization_mode]
additionalProperties: false

properties:
  feature_id:
    type: string
    pattern: "^[a-z][a-z0-9_]*\\.[a-z][a-z0-9_]*$"
    description: "Dot-namespaced identifier, e.g. pull_request.merge_time_hours"
  name:
    type: string
    minLength: 1
  description:
    type: string
  entity_type:
    type: string
    pattern: "^[A-Z][a-zA-Z0-9]*$"
    description: PascalCase entity name.
  entity_key:
    type: string
    pattern: "^[a-z][a-z0-9_]*$"
    description: Column on the entity table used as the join key to feature_value.entity_id.
  event_timestamp_column:
    type: string
    pattern: "^[a-z][a-z0-9_]*$"
    description: Optional timestamp column for future time-travel support.
  data_type:
    type: string
    enum: [STRING, INTEGER, FLOAT]
    description: Storage type; value TEXT in feature_value is CAST to this at query time.
  materialization_mode:
    type: string
    enum: [materialized, dynamic]
    description: "'materialized' stores values in feature_value; 'dynamic' is deferred."
  definition:
    type: string
    minLength: 1
    description: "SQL returning exactly two columns: entity_id and value. Alias for raw_sql."
  raw_sql:
    type: string
    minLength: 1
    description: "SQL returning exactly two columns: entity_id and value."
  expr:
    type: string
    minLength: 1
    description: "Semantic expression string compiled by the expression engine (ADR-116)."
  dependencies:
    type: array
    items:
      type: string
    description: feature_id values that must be computed before this feature.
  ttl_seconds:
    type: integer
    minimum: 1
    description: Optional TTL hint for future staleness-aware recompute.
