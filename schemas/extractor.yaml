# JSON Schema (2020-12 draft) for extractor YAML configs.
# Stored as YAML for consistency with the rest of the project.
$schema: "https://json-schema.org/draft/2020-12/schema"
title: Extractor Config
description: Schema for extractor YAML configuration files.
type: object
required: [tasks]
additionalProperties: false

$defs:
  output_spec:
    type: object
    required: [table, write_mode, columns]
    additionalProperties: false
    properties:
      table:
        type: string
        pattern: "^[a-z][a-z0-9_]*$"
      write_mode:
        type: string
        enum: [APPEND, UPSERT, REPLACE]
      primary_keys:
        type: array
        items:
          type: string
      row_source:
        type: object
        additionalProperties: false
        properties:
          mode:
            type: string
            enum: [SINGLE, EXPLODE]
          json_path:
            type: string
          inherit:
            type: object
            additionalProperties:
              type: string
      columns:
        type: array
        minItems: 1
        items:
          type: object
          required: [name, json_path]
          additionalProperties: false
          properties:
            name:
              type: string
              pattern: "^[a-z][a-z0-9_]*$"
            json_path:
              type: string
            type:
              type: string
              enum: [STRING, INTEGER, FLOAT, JSON]

properties:
  schedule:
    type: object
    additionalProperties: false
    properties:
      cron:
        type: string
        description: "Cron expression for scheduled execution (e.g. '0 1 * * *' for daily at 01:00 UTC)."
    required: [cron]
  tasks:
    type: array
    minItems: 1
    items:
      type: object
      required: [name, tool, command]
      additionalProperties: false
      properties:
        name:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        tool:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        command:
          type: string
        params:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
        context:
          type: object
          additionalProperties:
            type: string
        since:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}"
        incremental:
          type: boolean
        output:
          $ref: "#/$defs/output_spec"
        outputs:
          type: array
          minItems: 1
          items:
            $ref: "#/$defs/output_spec"
